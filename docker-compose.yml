version: '3.8'

services:
  nexus-hub:
    build: .
    container_name: nexus-hub
    restart: on-failure
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=file:/app/prisma/hub.db
    volumes:
      - nexus-hub-db:/app/prisma
      - x360-database:/x360-db:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nexus-hub.rule=Host(`nexushub.workmanos.com.br`)"
      - "traefik.http.services.nexus-hub.loadbalancer.server.port=3001"
      - "traefik.http.routers.nexus-hub.entrypoints=websecure"
      - "traefik.http.routers.nexus-hub.tls.certresolver=letsencrypt"

volumes:
  nexus-hub-db:
    driver: local

  x360-database:
    external: true
