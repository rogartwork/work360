version: '3.8'

services:
  app:
    image: ghcr.io/rogartwork/work360:latest
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/data/hub.db
    volumes:
      - nexus-hub-db:/app/data
      - gs360_x360-data:/x360-data:ro
    networks:
      - rogartwork
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=rogartwork"
        - "traefik.http.routers.portal_painel.rule=Host(`portal360.workmanos.com.br`)"
        - "traefik.http.routers.portal_painel.entrypoints=websecure"
        - "traefik.http.routers.portal_painel.priority=1"
        - "traefik.http.routers.portal_painel.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.portal_painel.service=portal_painel"
        - "traefik.http.services.portal_painel.loadbalancer.server.port=3000"
        - "traefik.http.services.portal_painel.loadbalancer.passHostHeader=true"

volumes:
  nexus-hub-db:
    driver: local
  gs360_x360-data:
    external: true

networks:
  rogartwork:
    external: true
